<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Student Records</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --card-bg: #334155;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border-color: #475569;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Background decoration */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            margin: 1rem;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 4rem;
            height: 4rem;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            border-radius: 1rem;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .form-input::placeholder {
            color: var(--text-muted);
        }
        
        .btn {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--accent-color);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        
        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-loading .btn-text {
            opacity: 0;
        }
        
        .btn-loading .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 0.875rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success-color);
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger-color);
        }
        
        .forgot-password {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .forgot-password a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.875rem;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        .security-note {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.5rem;
            padding: 0.875rem;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
        }
        
        .demo-credentials {
            background: var(--card-bg);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1.5rem;
            font-size: 0.75rem;
        }
        
        .demo-title {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .demo-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">⛓</div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Secure Student Records Management</p>
        </div>
        
        <div id="alerts"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="identifier" class="form-label">Username or College Email</label>
                <input 
                    type="text" 
                    id="identifier" 
                    name="identifier" 
                    class="form-input" 
                    placeholder="Enter username or college email"
                    required
                    autocomplete="username"
                >
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="btn" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <div class="loading" style="display: none;"></div>
            </button>
        </form>
        
        <div class="forgot-password">
            <a href="/register">New student? Create your account</a>
        </div>

        {% if google_enabled %}
        <div style="margin-top: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.8rem;">
            <span>OR</span>
        </div>
        <div style="margin-top: 0.75rem;">
            <a href="/auth/google" class="btn" style="background: #ffffff; color: #1f2933; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <img src="https://developers.google.com/identity/images/g-logo.png" width="18" height="18" alt="Google logo">
                <span class="btn-text">Sign in with Google</span>
            </a>
        </div>
        {% endif %}
        
        <div class="security-note">
            🔒 All communications are encrypted end-to-end. 
            Your credentials are never stored in plain text.
        </div>
    </div>
    
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const alertsContainer = document.getElementById('alerts');
        
        function showAlert(message, type = 'error') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            alertsContainer.innerHTML = '';
            alertsContainer.appendChild(alertDiv);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
        
        function setLoading(loading) {
            const btnText = loginBtn.querySelector('.btn-text');
            const loadingSpinner = loginBtn.querySelector('.loading');
            
            if (loading) {
                loginBtn.classList.add('btn-loading');
                loginBtn.disabled = true;
                loadingSpinner.style.display = 'block';
            } else {
                loginBtn.classList.remove('btn-loading');
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
            }
        }
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(loginForm);
            const credentials = {
                identifier: formData.get('identifier'),
                password: formData.get('password')
            };
            
            if (!credentials.identifier || !credentials.password) {
                showAlert('Please enter your username/email and password');
                return;
            }
            
            setLoading(true);
            
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(credentials)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Redirect based on user role
                    setTimeout(() => {
                        switch(data.user?.role) {
                            case 'admin':
                                window.location.href = '/admin_dashboard';
                                break;
                            case 'student':
                                window.location.href = '/student_portal';
                                break;
                            case 'verifier':
                                window.location.href = '/verifier_panel';
                                break;
                            default:
                                window.location.href = '/dashboard';
                        }
                    }, 1000);
                } else {
                    showAlert(data.message || 'Login failed');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Please try again.');
            } finally {
                setLoading(false);
            }
        });
        
        // Auto-fill demo credentials on click
        document.addEventListener('click', function(e) {
            const demoItem = e.target.closest('.demo-item');
            if (demoItem) {
                const text = demoItem.textContent;
                if (text.includes('admin / admin123')) {
                    document.getElementById('identifier').value = 'admin';
                    document.getElementById('password').value = 'admin123';
                } else if (text.includes('student / pass123')) {
                    document.getElementById('identifier').value = 'student';
                    document.getElementById('password').value = 'pass123';
                } else if (text.includes('verifier / verify123')) {
                    document.getElementById('identifier').value = 'verifier';
                    document.getElementById('password').value = 'verify123';
                }
            }
        });
        
        // Focus management
        document.getElementById('identifier').focus();
        
        // Enter key handling
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !loginBtn.disabled) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
